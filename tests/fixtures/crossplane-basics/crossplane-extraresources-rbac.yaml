---
# Allow Crossplane core controllers (serviceaccount crossplane-system/crossplane)
# to fetch cluster-scoped resources referenced by Composition
# `extraResourceRequirements`.
#
# This is intentionally scoped to the specific resources used by the E2E suite.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-extraresources-e2e
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-extraresources-e2e
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-extraresources-e2e
subjects:
  - kind: ServiceAccount
    name: crossplane
    namespace: crossplane-system

